name: Release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
  packages: write
jobs:
  binaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with: {go-version-file: go.mod}
      - name: Build binaries
        shell: bash
        run: |
          mkdir dist
          for os in linux darwin; do for arch in amd64 arm64; do GOOS=$os GOARCH=$arch CGO_ENABLED=0 go build -trimpath -ldflags='-s -w' -o "dist/notiferry-$os-$arch" .; done; done
          (cd dist && sha256sum notiferry-* > checksums.txt)
      - uses: softprops/action-gh-release@v2
        with: {files: dist/*}
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/omerktn/notiferry:${{ github.ref_name }},ghcr.io/omerktn/notiferry:latest
