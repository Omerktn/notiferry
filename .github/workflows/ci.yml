name: CI
on:
  push:
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with: {go-version-file: go.mod}
      - run: go test ./...
      - run: go test -race ./...
      - run: go vet ./...
      - run: go build ./...
